<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="weather-style.css">
</head>
<body>

  <div class="weather-container">
    <!-- Header -->
    <div class="header">
      <h1>🌤️ Weather Dashboard</h1>
      <p>Get real-time weather forecasts for any location</p>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Enter city name..." 
        autocomplete="off"
      >
      <button id="searchBtn" class="search-btn">Search</button>
      <button id="locationBtn" class="location-btn">📍 Current Location</button>
    </div>

    <!-- Error Message -->
    <div id="errorMessage"></div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner">
      <div class="spinner"></div>
      <p style="color: white; font-size: 18px;">Loading weather data...</p>
    </div>

    <!-- Main Content -->
    <div id="mainContent">
      <!-- Current Weather -->
      <div class="current-weather">
        <div class="weather-main">
          <img id="weatherIcon" src="" alt="Weather Icon">
          <div class="city-name" id="cityName">--</div>
          <div class="current-date" id="currentDate">--</div>
          <div class="temperature" id="temperature">--°C</div>
          <div class="weather-description" id="weatherDescription">--</div>
          <div class="feels-like">Feels like: <span id="feelsLike">--°C</span></div>
        </div>

        <div class="weather-details">
          <div class="detail-item">
            <div>
              <div class="detail-label">Humidity</div>
              <div class="detail-value" id="humidity">--%</div>
            </div>
          </div>

          <div class="detail-item">
            <div>
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value" id="windSpeed">-- m/s</div>
            </div>
          </div>

          <div class="detail-item">
            <div>
              <div class="detail-label">Pressure</div>
              <div class="detail-value" id="pressure">-- hPa</div>
            </div>
          </div>

          <div class="detail-item">
            <div>
              <div class="detail-label">Visibility</div>
              <div class="detail-value" id="visibility">-- km</div>
            </div>
          </div>

          <div class="detail-item">
            <div>
              <div class="detail-label">Cloud Coverage</div>
              <div class="detail-value" id="clouds">--%</div>
            </div>
          </div>

          <div class="detail-item">
            <div>
              <div class="detail-label">UV Index</div>
              <div class="detail-value" id="uvIndex">--</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Hourly Forecast -->
      <div class="forecast-section">
        <h2 class="forecast-title">⏰ Hourly Forecast</h2>
        <div id="hourlyForecast"></div>
      </div>

      <!-- Daily Forecast -->
      <div class="forecast-section">
        <h2 class="forecast-title">📅 5-Day Forecast</h2>
        <div id="dailyForecast"></div>
      </div>
    </div>
  </div>

  <script src="weather-script.js"></script>
</body>
</html>
